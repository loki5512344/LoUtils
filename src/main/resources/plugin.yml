name: LoUtils
version: ${version}
main: xyz.lokili.loutils.LoUtils
api-version: "1.21"
folia-supported: true
author: loki
description: All-in-one utility plugin for Folia
softdepend:
  - PlaceholderAPI
  - LuckPerms

commands:
  lw:
    description: Whitelist management
    usage: /lw <add|remove|list|enable|disable|reload> [player]
    permission: loutils.whitelist
  lar:
    description: AutoRestart management
    usage: /lar <start|stop|status|reload>
    permission: loutils.autorestart
  ll:
    description: Dimension lock management
    usage: /ll <lock|unlock|status|reload> [dimension] [time]
    permission: loutils.lock
  lv:
    description: Vanish toggle
    usage: /lv [player]
    permission: loutils.vanish
  lspawnmob:
    description: Spawn mobs
    usage: /lspawnmob <mob> <amount>
    permission: loutils.spawnmob
  linvsee:
    description: View player inventory
    usage: /linvsee <player>
    permission: loutils.invsee
  lenchant:
    description: Enchant items
    usage: /lenchant <enchantment> <level>
    permission: loutils.enchant
  lfly:
    description: Toggle fly mode
    usage: /lfly [player]
    permission: loutils.fly
  lflyspeed:
    description: Set fly speed
    usage: /lflyspeed <0-10> [player]
    permission: loutils.flyspeed
  loutils:
    description: Main plugin command
    usage: /loutils reload
    permission: loutils.admin
    aliases: [lu]
  ltpsbar:
    description: Toggle TPS bar
    usage: /ltpsbar [on|off]
    permission: loutils.tpsbar
    aliases: [ltps]

permissions:
  loutils.whitelist:
    description: Access to /lw command
    default: op
  loutils.autorestart:
    description: Access to /lar command
    default: op
  loutils.lock:
    description: Access to /ll command
    default: op
  loutils.lock.bypass:
    description: Bypass dimension lock
    default: op
  loutils.vanish:
    description: Access to /lv command
    default: op
  loutils.vanish.see:
    description: See vanished players
    default: op
  loutils.spawnmob:
    description: Access to /lspawnmob command
    default: op
  loutils.invsee:
    description: Access to /linvsee command
    default: op
  loutils.enchant:
    description: Access to /lenchant command
    default: op
  loutils.fly:
    description: Access to /lfly command
    default: op
  loutils.flyspeed:
    description: Access to /lflyspeed command
    default: op
  loutils.admin:
    description: Access to /loutils command
    default: op
  loutils.tpsbar:
    description: Access to /ltpsbar command
    default: op
