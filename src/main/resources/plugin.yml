name: LoUtils
version: ${version}
main: xyz.lokili.loutils.LoUtils
api-version: "1.21"
folia-supported: true
author: loki
description: All-in-one utility plugin for Paper/Folia 1.21.3+
website: https://codeberg.org/loki5512344/LoUtils
softdepend:
  - PlaceholderAPI
  - LuckPerms

commands:
  lw:
    description: Whitelist management
    usage: /lw <add|remove|list|enable|disable|reload> [player]
    permission: loutils.whitelist
  lar:
    description: AutoRestart management
    usage: /lar <start|stop|status|reload>
    permission: loutils.autorestart
  lspawnmob:
    description: Spawn mobs
    usage: /lspawnmob <mob> <amount>
    permission: loutils.spawnmob
  linvsee:
    description: View player inventory
    usage: /linvsee <player>
    permission: loutils.invsee
  lenchant:
    description: Enchant items
    usage: /lenchant <enchantment> <level>
    permission: loutils.enchant
  lfly:
    description: Toggle fly mode
    usage: /lfly [player]
    permission: loutils.fly
  lflyspeed:
    description: Set fly speed
    usage: /lflyspeed <0-10> [player]
    permission: loutils.flyspeed
  loutils:
    description: Main plugin command
    usage: /loutils <reload|give>
    permission: loutils.admin
    aliases: [lu]
  ltpsbar:
    description: Toggle TPS bar
    usage: /ltpsbar [on|off]
    permission: loutils.tpsbar
    aliases: [ltps]
  lcolortest:
    description: Test color formats (debug command)
    usage: /lcolortest
    permission: loutils.admin
  lcolorfix:
    description: Fix color formats in messages
    usage: /lcolorfix <apply|revert|test>
    permission: loutils.admin
  lfastleaf:
    description: Manage FastLeafDecay module
    usage: /lfastleaf [enable|disable|status|reload|set]
    permission: loutils.admin
    aliases: [lfld]
  worldlock:
    description: Manage world locks
    usage: /worldlock <add|remove|list|reload> [world]
    permission: loutils.worldlock
    aliases: [wl]
  sit:
    description: Sit down
    usage: /sit
    permission: loutils.sit
  pose:
    description: Manage poses
    usage: /pose stop
    permission: loutils.pose
  map:
    description: Lock/unlock maps
    usage: /map <lock|unlock>
    permission: loutils.map

permissions:
  loutils.whitelist:
    description: Access to /lw command
    default: op
  loutils.autorestart:
    description: Access to /lar command
    default: op
  loutils.spawnmob:
    description: Access to /lspawnmob command
    default: op
  loutils.invsee:
    description: Access to /linvsee command
    default: op
  loutils.enchant:
    description: Access to /lenchant command
    default: op
  loutils.fly:
    description: Access to /lfly command
    default: op
  loutils.flyspeed:
    description: Access to /lflyspeed command
    default: op
  loutils.admin:
    description: Access to /loutils command
    default: op
  loutils.tpsbar:
    description: Access to /ltpsbar command
    default: op
  loutils.worldlock:
    description: Access to /worldlock command
    default: op
  loutils.worldlock.bypass.*:
    description: Bypass world lock for all worlds
    default: false
  # Включает Paper: minecraft.debugstick.always — иначе в выживании палка не работает (только креатив/оп)
  loutils.debugstick:
    description: Use custom debug stick (survival + creative)
    default: op
    children:
      minecraft.debugstick.always: true
  loutils.inventorycheckstick:
    description: Use inventory check stick (hit players to scan)
    default: op
  loutils.handcuffs:
    description: Use handcuffs (cuff/uncuff players)
    default: op
  loutils.handcuffs.bypass:
    description: Move and teleport while cuffed (admin/debug)
    default: false
  loutils.sit:
    description: Access to /sit command
    default: true
  loutils.pose:
    description: Access to /pose command
    default: true
  loutils.map:
    description: Access to /map command
    default: true
