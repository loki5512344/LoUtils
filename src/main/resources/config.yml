# LoUtils - Main Configuration
# Автор: loki | Folia 1.21.3+
# Версия: 2.2.0
# Поддержка цветов: &#RRGGBB (hex) и &c (legacy)

# Включение/отключение модулей
modules:
  whitelist: true
  autorestart: true
  deathmessages: true
  enchant: true
  tpsbar: true
  invsee: true
  spawnmob: true
  fly: true
  worldlock: true
  customworldheight: true
  fastleafdecay: true
  sleeppercentage: true
  villagerleash: true
  cauldron: true
  light-block: true
  debug-stick: true
  invisible-frames: true
  poses: true
  inventory-check-stick: true
  cow-milking: true
  handcuffs: true

# Кастомные рецепты плагина в книге рецептов при входе.
# false — изначально не показываются (игрок может открыть рецепт после крафта вручную, если сервер его выдаёт).
# true — как раньше: все открытые ключи рецептов выдаются при входе.
recipes:
  discover-custom-on-join: false

# Префикс плагина
prefix: "&#7858E9[LoUtils] &7"
