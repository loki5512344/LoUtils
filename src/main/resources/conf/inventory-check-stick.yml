# Палка проверки инвентаря — удар по игроку основной рукой с этой палкой
# сканирует инвентарь цели (рюкзак, хотбар, броня, вторая рука) на материалы из списка.

enabled: true

# Крафт палки отключён — выдача только админ-командой /loutils give и т.п.
crafting-enabled: false

# Право loutils.inventorycheckstick
require-permission: true

# Не наносить урон при проверке
cancel-damage: true

# Задержка между проверками одного игрока (секунды), 0 = без задержки
cooldown-seconds: 0

# CustomModelData для ресурс-пака (0 = выкл)
custom-model-data: 0

# Имя предмета (цвета & и &#RRGGBB)
item-name: "&6Палка проверки"

# Имена материалов Bukkit (как в /give): https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
# Неизвестные строки пишутся в лог при загрузке.
forbidden-materials:
  # Золото
  - GOLD_BLOCK
  - RAW_GOLD_BLOCK
  - GOLD_INGOT
  - GOLD_NUGGET
  - GOLD_ORE
  - DEEPSLATE_GOLD_ORE
  # Кварц (блоки и руда Нижнего мира)
  - QUARTZ
  - QUARTZ_BLOCK
  - SMOOTH_QUARTZ
  - QUARTZ_PILLAR
  - QUARTZ_BRICKS
  - CHISELED_QUARTZ_BLOCK
  - QUARTZ_STAIRS
  - SMOOTH_QUARTZ_STAIRS
  - QUARTZ_SLAB
  - SMOOTH_QUARTZ_SLAB
  - NETHER_QUARTZ_ORE
  # Незерак и общий «незер»
  - NETHERRACK
  - RESPAWN_ANCHOR
  - CRYING_OBSIDIAN
  - GLOWSTONE
  - GLOWSTONE_DUST
  # Незерит
  - ANCIENT_DEBRIS
  - NETHERITE_BLOCK
  - NETHERITE_INGOT
  - NETHERITE_SCRAP
  - NETHERITE_UPGRADE_SMITHING_TEMPLATE
  # Незер-кирпичи / крепость / звезда
  - NETHER_BRICK
  - NETHER_BRICKS
  - CRACKED_NETHER_BRICKS
  - CHISELED_NETHER_BRICKS
  - RED_NETHER_BRICKS
  - NETHER_BRICK_FENCE
  - NETHER_BRICK_WALL
  - NETHER_BRICK_STAIRS
  - RED_NETHER_BRICK_STAIRS
  - NETHER_STAR
  # Нарост (незерский нарост)
  - NETHER_WART
  - NETHER_WART_BLOCK
  # Песок душ / почва душ
  - SOUL_SAND
  - SOUL_SOIL
  - SOUL_TORCH
  - SOUL_LANTERN
  - SOUL_CAMPFIRE
  # Чернит
  - BLACKSTONE
  - POLISHED_BLACKSTONE
  - POLISHED_BLACKSTONE_BRICKS
  - CRACKED_POLISHED_BLACKSTONE_BRICKS
  - CHISELED_POLISHED_BLACKSTONE
  - GILDED_BLACKSTONE
  # Базальт
  - BASALT
  - POLISHED_BASALT
  - SMOOTH_BASALT
  # Магма / пламенный порошок / стержень
  - MAGMA_BLOCK
  - MAGMA_CREAM
  - BLAZE_POWDER
  - BLAZE_ROD
  # Багровое / искажённое дерево, грибы, свет (SHROOMLIGHT, фонари)
  - CRIMSON_STEM
  - WARPED_STEM
  - STRIPPED_CRIMSON_STEM
  - STRIPPED_WARPED_STEM
  - CRIMSON_HYPHAE
  - WARPED_HYPHAE
  - CRIMSON_PLANKS
  - WARPED_PLANKS
  - CRIMSON_NYLIUM
  - WARPED_NYLIUM
  - CRIMSON_FUNGUS
  - WARPED_FUNGUS
  - CRIMSON_ROOTS
  - WARPED_ROOTS
  - WEEPING_VINES
  - TWISTING_VINES
  - SHROOMLIGHT
  - LANTERN
  - SOUL_LANTERN
  # Грибы (любые)
  - RED_MUSHROOM
  - BROWN_MUSHROOM
  - RED_MUSHROOM_BLOCK
  - BROWN_MUSHROOM_BLOCK
  - MUSHROOM_STEM
  # Руды Нижнего мира (золотая, кварцевая, обломки)
  - NETHER_GOLD_ORE
  # Костные блоки и головы (GHAST_HEAD, DRIED_GHAST — с 1.21.6+; на более старых ядрах
  # неизвестные имена дадут предупреждение в лог при загрузке — удалите строки при необходимости)
  - BONE_BLOCK
  - WITHER_SKELETON_SKULL
  - GHAST_HEAD
  - DRIED_GHAST
  # Эндер-жемчуг
  - ENDER_PEARL

