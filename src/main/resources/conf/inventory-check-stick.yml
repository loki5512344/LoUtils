messages:
  no-permission: "&cНет прав на использование палки проверки."
  none-found: "&aУ игрока &e{target} &aнет предметов из списка."
  # Заголовок и разделитель при нахождении запрета (несколько строк в чат)
  found-title: "&cСписок запреток"
  found-separator: "&7--------------------------------------------------"
  # Строка под разделителем (цель). Пусто или none — не показывать
  found-target-line: "&7Игрок: &e{target}"
  # Одна строка = один предмет: русское имя | количество
  found-line: "&f{name} &7| &e{amount}"

