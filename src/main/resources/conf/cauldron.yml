# CauldronCrafting - Котел как станция переработки

enabled: true

# Очистка бетона: цемент + вода → бетон
concrete-cleaning:
  enabled: true
  # Уровень воды, который расходуется (1-3)
  water-cost: 1

# Стирка: покрашенная броня/флаги/кровать → дефолтный цвет
washing:
  enabled: true
  # Уровень воды, который расходуется (1-3)
  water-cost: 1
