# CauldronCrafting - Котел как станция переработки

enabled: true

# Превращение сухого бетона в бетон: concrete powder + вода → concrete
# 1 стак = 1 деление воды
concrete-cleaning:
  enabled: true
  # Уровень воды, который расходуется (1-3)
  water-cost: 1

# Стирка: покрашенная броня/флаги/кровать → дефолтный цвет
washing:
  enabled: true
  # Уровень воды, который расходуется (1-3)
  water-cost: 1
