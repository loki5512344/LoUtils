# LoUtils - Vanish Configuration
# Поддержка цветов: &#RRGGBB (hex) и &c (legacy)

# Сохранять состояние vanish между сессиями
save_state: true

# Скрывать из TAB листа (требует TAB плагин с поддержкой)
hide_from_tab: true

# Блокировать сообщения о достижениях
block_advancements: true

# Тихий вход/выход (без сообщений)
silent_join_quit: true

# === Взаимодействия ===

# Открывать сундуки без анимации и звука
silent_containers: true

# Тихое взаимодействие с дверями/люками
silent_interactions: true

# Блокировать подбор предметов
block_pickup: false

# Блокировать выбрасывание предметов
block_drop: false

# === PvP в ванише ===

# Разрешить получать урон от игроков
allow_pvp_damage: false

# Разрешить наносить урон игрокам
allow_pvp_attack: false

# === Эффекты ===
effects:
  night_vision: true
  
# === Сообщения ===
messages:
  enabled: "&#3BA8FFВы теперь &aневидимы"
  disabled: "&#3BA8FFВы теперь &cвидимы"
  enabled-other: "&#3BA8FF{player} теперь &aневидим"
  disabled-other: "&#3BA8FF{player} теперь &cвидим"
