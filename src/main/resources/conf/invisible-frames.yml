# Invisible Item Frames - Невидимые рамки

enabled: true

# Метод 1: Кинуть splash/lingering зелье невидимости на рамку на стене
splash-potion-method: true

# Метод 2: Крафт в верстаке (1 зелье невидимости + 8 рамок = 8 невидимых рамок)
# Работает с любым зельем невидимости: обычное, splash, lingering
crafting-method: true

# Название невидимой рамки в инвентаре
# Поддерживает hex-цвета &#RRGGBB и legacy коды &c
display-name: "&#B798A8Невидимая рамка"

# CustomModelData для текстуры предмета в инвентаре (для ресурс-паков)
# Установите 0 чтобы не использовать кастомную модель
custom-model-data: 0

# Показывать частицы вокруг невидимых рамок когда держишь невидимую рамку в руке
show-particles: true

# Радиус видимости частиц (в блоках)
particle-radius: 16
