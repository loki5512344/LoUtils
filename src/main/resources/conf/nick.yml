# LoUtils - Nick Configuration
# Поддержка цветов: &#RRGGBB (hex) и &c (legacy)

# Максимальная длина ника (без учёта цветовых кодов)
max_length: 24

# Минимальная длина ника
min_length: 3

# Разрешённые символы (regex)
# По умолчанию: русские, английские буквы, цифры, пробел, подчёркивание
allowed_pattern: "^[a-zA-Zа-яА-ЯёЁ0-9_ ]+$"

# Разрешить цвета в нике
allow_colors: true

# Разрешить форматирование (&l, &o, &n и т.д.)
allow_formatting: true

# Запрещённые слова в нике (без учёта регистра)
blacklist:
  - "admin"
  - "owner"
  - "moderator"
  - "moder"
  - "helper"
  - "server"

# Сообщения
messages:
  set: "&#3BA8FFВаш ник изменён на: {nick}"
  reset: "&#3BA8FFВаш ник сброшен"
  set-other: "&#3BA8FFНик игрока &f{player} &#3BA8FFизменён на: {nick}"
  reset-other: "&#3BA8FFНик игрока &f{player} &#3BA8FFсброшен"
  too-long: "&cНик слишком длинный (макс. {max} символов)"
  too-short: "&cНик слишком короткий (мин. {min} символов)"
  invalid-chars: "&cНик содержит запрещённые символы"
  blacklisted: "&cЭтот ник запрещён"
  usage: "&cИспользование: /lnick <ник> или /lnick reset"
