# Custom Crafts - Кастомные крафты

enabled: true

# Колокол (Bell)
# Рецепт: камень + палка + камень / золото x3 / самородок + золото + самородок
bell:
  enabled: true

# Красный гриб блок (Red Mushroom Block)
# Рецепт: 4 красных гриба
red-mushroom-block:
  enabled: true

# Коричневый гриб блок (Brown Mushroom Block)
# Рецепт: 4 коричневых гриба
brown-mushroom-block:
  enabled: true

# Паутина (Cobweb)
# Рецепт: 5 ниток
cobweb:
  enabled: true

# Подмостки (Scaffolding)
# Рецепт: 6 палок + нить
scaffolding:
  enabled: true
  amount: 4 # количество в результате

# Кварц (Quartz) — верстак 3×3: булыжник в центре, 8 андезита по краю → QUARTZ x amount
quartz:
  enabled: true
  amount: 8

# Фейерверк 4 уровня (Firework Level 4)
# Рецепт: бумага + огненный порошок / 3 пороха
firework-level-4:
  enabled: true
  flight-duration: 4
  name-format: "§eФейерверк §7[§f%level%§7]"
  lore:
    - "§7Длительность полёта: §f%level%"

# Крафтовые элитры: половина прочности ванильных, только «Починка» I (слабее ванили), лимит полёта и перезарядка, нет полёта в дождь
# Верстак 3×3: слизь — алмаз — слизь / мембрана — алмазный нагрудник — мембрана (нижний ряд пустой)
# Уровень 2: заряд ветра — алмазный блок — заряд ветра / алмазный блок — элитра tier1 — алмазный блок / то же нижний ряд
elytra:
  enabled: true
  # В наковальне: не накапливать стоимость уровней выше этого (и prior work на предмете сбрасывается)
  anvil-max-level-cost: 1
  mending:
    enabled: true
    # Доля от ванильного количества починки за сферу опыта (остальное поведение — как в PlayerItemMendEvent)
    efficiency: 0.5
  name-format: "&cКрылья фантома"
  lore:
    - "&7Слияние слизи, мембран и алмазной брони"
    - "&8Крафт LoUtils"
  # Выше ванильных 432
  max-damage: 500
  # 6 минут полёта до перегрева (20 тиков/сек)
  flight-limit-ticks: 7200
  # Перезарядка после перегрева (секунды)
  recharge-seconds: 180
  # Как часто обновлять полоску и таймер в описании (тики)
  lore-update-interval-ticks: 10
  lore-time-line: "&7Полёт: &f{used} &7/ &f{limit}"
  flight-bar:
    segments: 18
    prefix: "&8["
    suffix: "&8]"
    pipe: "|"
    empty: "&8|"
    filled-colors:
      - "&c"
      - "&6"
      - "&e"
      - "&a"
  lore-recharge-line: "&cПерезарядка: &f{seconds} &7сек"
  messages:
    recharge: "&cКрылья перегреты. Подожди перезарядку."
    rain: "&cВ дождь на этих крыльях не летают."
    overheated: "&cПерегрев — крылья на перезарядке."
  tier2:
    enabled: true
    name-format: "&bКрылья фантома &7[II]"
    max-damage: 550
    flight-limit-ticks: 7200
    recharge-seconds: 180

# Эхо-кирка: 3 осколка эха / палка / палка → деревянная кирка (500 прочн., только Эффективность 8)
# Руды и прочие блоки не ломает — только список allowed-materials (камень и «каменные» блоки)
echo-pickaxe:
  enabled: true
  name-format: "&bЭхо-кирка"
  lore:
    - "&7Только камень и подобное — руды не копает"
    - "&8Крафт LoUtils"
  max-damage: 500
  efficiency-level: 8
  messages:
    wrong-block: "&cЭхо-кирка копает только камень и подобные блоки, не руды."
  # Пустой список = встроенный набор (камень, диорит, андезит, гранит, булыжник, глубинный сланец и т.д.)
  allowed-materials: []
