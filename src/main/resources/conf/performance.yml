# Performance Profiler - мониторинг TPS и отправка отчётов в Discord

enabled: true

# Discord Webhook URL для отправки отчётов
webhook-url: ""

# Порог TPS для срабатывания (если TPS падает ниже этого значения)
tps-threshold: 15.0

# Интервал проверки TPS (в секундах)
check-interval: 30

# Cooldown между отправками отчётов (в секундах, чтобы не спамить)
report-cooldown: 300

# Максимальное количество энтити в отчёте
max-entities-in-report: 20

# Максимальное количество игроков в отчёте
max-players-in-report: 10

# Включить детальный анализ чанков
detailed-chunk-analysis: true

# Порог количества энтити в чанке для предупреждения
entity-per-chunk-threshold: 50
