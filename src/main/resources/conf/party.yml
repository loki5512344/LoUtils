# LoUtils - Party Configuration

enabled: true

# Максимум игроков в пати
max_size: 8

# Время жизни приглашения (секунды)
invite_timeout: 60

# Суффикс в чате/табе
suffix:
  enabled: true
  format: " &7[{color}Party&7]"
  # Доступные цвета для пати
  colors:
    - "&#FF6B6B"
    - "&#6BCB77"
    - "&#4D96FF"
    - "&#FFD93D"
    - "&#C9B1FF"
    - "&#FF9F45"
    - "&#6FEDD6"
    - "&#FF6FB5"

# Сообщения
messages:
  created: "&#3BA8FFВы создали пати"
  disbanded: "&#3BA8FFПати распущено"
  invited: "&#3BA8FFВы пригласили &f{player} &7в пати"
  invite-received: "&#3BA8FF{player} &7приглашает вас в пати. &a/lparty accept &7или &c/lparty deny"
  joined: "&#3BA8FF{player} &7присоединился к пати"
  left: "&#3BA8FF{player} &7покинул пати"
  kicked: "&#3BA8FF{player} &7был исключён из пати"
  you-kicked: "&cВы были исключены из пати"
  not-in-party: "&cВы не в пати"
  already-in-party: "&cВы уже в пати"
  player-not-in-party: "&cЭтот игрок не в вашем пати"
  not-leader: "&cТолько лидер может это делать"
  party-full: "&cПати заполнено"
  no-invite: "&cУ вас нет приглашений"
  invite-expired: "&cПриглашение истекло"
  color-changed: "&#3BA8FFЦвет пати изменён на {color}■"
  list-header: "&#3BA8FF=== Пати ({count}/{max}) ==="
  list-leader: "&6♛ &f{player}"
  list-member: "&7• &f{player}"
