# Name Tag Removal - Снятие бирок с мобов ножницами
# ПКМ ножницами по мобу с биркой = снять бирку

enabled: true

# Дропать бирку как предмет с сохранённым именем
drop-tag: true

# Звуковые эффекты
sounds: true

# Чёрный список мобов (с которых нельзя снять бирку)
blacklist:
  - ENDER_DRAGON
  - WITHER

# Сообщения (action bar)
messages:
  removed: "&#9878C9✓ &#B798A8Бирка снята"
  no-tag: "&#FF6B6B✗ &#B798A8У этого моба нет бирки"
  blacklisted: "&#FF6B6B✗ &#B798A8С этого моба нельзя снять бирку"
