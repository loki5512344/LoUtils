# Enhanced Hoes - Улучшенные мотыги
# Разные мотыги дают разное количество бонусного дропа при сборе урожая

enabled: true

# Настройки для каждого типа мотыги
# min-bonus и max-bonus - диапазон бонусного дропа (добавляется к обычному дропу)
hoes:
  wooden:
    min-bonus: 0
    max-bonus: 1  # 0-1 бонусный предмет
  
  stone:
    min-bonus: 0
    max-bonus: 2  # 0-2 бонусных предмета
  
  iron:
    min-bonus: 1
    max-bonus: 3  # 1-3 бонусных предмета
  
  golden:
    min-bonus: 1
    max-bonus: 4  # 1-4 бонусных предмета (компенсация за низкую прочность)
  
  diamond:
    min-bonus: 2
    max-bonus: 4  # 2-4 бонусных предмета
  
  netherite:
    min-bonus: 3
    max-bonus: 5  # 3-5 бонусных предметов

# Поддерживаемые культуры
# Автоматически: пшеница, морковь, картофель, свёкла, адский нарост
