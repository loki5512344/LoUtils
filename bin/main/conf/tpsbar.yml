# LoUtils TPSBar Configuration
# Supports colors: &#RRGGBB (hex) and &c (legacy)

# Enable/disable module
enabled: true

# BossBar format
# Placeholders: {region_tps}, {global_tps}, {mspt}, {world}, {x}, {z}
format: "&#9878C9⚡ &fTPS: &#7858E9{region_tps} &8| &#9878C9⏱ &fMSPT: &#7858E9{mspt}"

# Update interval in ticks (20 ticks = 1 second)
update-interval: 20

# Messages
messages:
  enabled: "&#9878C9TPSBar включён!"
  disabled: "&#FF6B6BTPSBar выключен!"
  already-enabled: "&#B798A8TPSBar уже включён!"
  already-disabled: "&#B798A8TPSBar уже выключен!"
  usage: "&#7858E9Использование: /ltpsbar [on|off]"
