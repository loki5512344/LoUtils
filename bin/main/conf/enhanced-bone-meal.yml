# Enhanced Bone Meal - Костная мука для тростника и кактусов
# Порт механики с Bedrock Edition

enabled: true

# Настройки для тростника
sugar-cane:
  enabled: true
  max-height: 3              # Максимальная высота
  growth-amount-min: 1       # Минимальное количество блоков роста
  growth-amount-max: 3       # Максимальное количество блоков роста
  success-chance: 0.75       # Шанс успеха (75%)

# Настройки для кактуса
cactus:
  enabled: true
  max-height: 3
  growth-amount-min: 1
  growth-amount-max: 3
  success-chance: 0.75

# Эффекты
particles: true
sounds: true
