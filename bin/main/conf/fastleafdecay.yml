# FastLeafDecay - Быстрое гниение листвы
# Листва исчезает за несколько секунд после рубки дерева
# ВАЖНО: Удаляет только листву ТОГО ЖЕ типа дерева (дуб не трогает берёзу)

enabled: true

# Задержка перед началом гниения (в тиках, 20 тиков = 1 секунда)
decay-delay: 40

# Радиус поиска листвы вокруг срубленного бревна
search-radius: 5

# Анимация удаления листьев (задержка между удалением каждого листа в тиках)
animation-delay: 2

# Умный алгоритм (проверяет связь листьев с брёвнами того же типа)
# Если false - удаляет ВСЕ листья этого типа в радиусе
smart-decay: true
