enabled: true

# Запретить копирование заблокированных карт
prevent-copying: true

# Формат описания заблокированной карты
lore-format: "&#B798A8Заблокировано: &#9878C9%player%"

# Сообщения (action bar)
messages:
  locked: "&#9878C9Карта заблокирована"
  unlocked: "&#9878C9Карта разблокирована"
  not-owner: "&#FF6B6BВы не можете разблокировать карту другого игрока"
  not-map: "&#FF6B6BВы должны держать карту в руке"
  already-locked: "&#FF6B6BЭта карта уже заблокирована"
  not-locked: "&#FF6B6BЭта карта не заблокирована"
