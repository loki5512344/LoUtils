# Map Locking - Блокировка карт от копирования
# Защита мапартов от нежелательного копирования

enabled: true

# Запретить копирование заблокированных карт в картографическом столе
prevent-copying: true

# Формат описания в карте
lore-format: "&#B798A8Заблокировано: &#9878C9%player%"

# Сообщения (action bar)
messages:
  locked: "&#9878C9✓ &#B798A8Карта заблокирована"
  unlocked: "&#9878C9✓ &#B798A8Карта разблокирована"
  not-owner: "&#FF6B6B✗ &#B798A8Вы не можете разблокировать карту, заблокированную другим игроком"
  not-locked: "&#FF6B6B✗ &#B798A8Эта карта не заблокирована"
  hold-map: "&#FF6B6B✗ &#B798A8Возьмите карту в руку"
