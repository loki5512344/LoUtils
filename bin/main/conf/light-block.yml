# Light Block - Источник света

enabled: true

# Крафт в верстаке (8 светокамня вокруг + 1 свечка в центре)
crafting-enabled: true

# Показывать частицы вокруг блоков света когда игрок держит блок света в руке
# Работает как барьеры в креативе - держишь в руке = видишь блоки
show-particles: true

# Радиус показа частиц (в блоках)
particle-radius: 16

# Минимальный уровень света
min-level: 0

# Максимальный уровень света
max-level: 15

# Формат названия предмета (%level% = уровень света)
name-format: "§eИсточник света §7[§f%level%§7]"

# CustomModelData для текстуры предмета в инвентаре (для ресурс-паков)
# Установите 0 чтобы не использовать кастомную модель
custom-model-data: 0

# === Как использовать ===
# 1. Скрафтить блок света (8 светокамня + 1 свечка)
# 2. Поставить блок света (ПКМ)
# 3. Shift + ПКМ по блоку = изменить уровень света (0-15)
# 4. ПКМ по блоку с блоком света в руке = удалить блок и получить дроп
# 5. Держи блок света в руке чтобы видеть все блоки света вокруг (частицы)
